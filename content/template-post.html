<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} | SeeteeS MOD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand-link" href="../index.html" style="text-decoration: none; color: inherit;">
        <div class="brand-name">SeeteeS<span>mod.</span></div>
      </a>
      <nav>
        <a class="nav-link" href="../index.html">Analisi</a>
        <a class="nav-link" href="../archive.html">Archivio</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <article class="post-content reveal" style="padding: 80px 0;">
      <span class="label-street">{{CATEGORY}} // {{DATE}}</span>
      <h1 style="font-family: var(--font-serif); font-size: clamp(2.5rem, 5vw, 4.5rem); margin: 20px 0; line-height: 1;">{{TITLE}}</h1>
      
      <div style="margin: 40px 0; border: 4px solid #000; padding: 2px;">
        <img src="{{IMAGE_URL}}" alt="{{TITLE}}" style="width: 100%; height: auto; display: block; filter: grayscale(100%);">
      </div>

      <div class="editorial-text" style="font-size: 1.2rem; line-height: 1.6; max-width: 800px; margin: 0 auto;">
        {{CONTENT}}
      </div>
      
      <!-- 3D Placeholder -->
      <div class="viewer-3d-container" style="margin-top: 60px; border: 2px dashed #ccc; padding: 40px; text-align: center;">
        <p class="meta">3D VISUAL INTELLIGENCE TERMINAL</p>
        <p style="color: #888;">[ Modello 3D in fase di caricamento... ]</p>
      </div>
    </article>

    <footer class="footer">
      <div class="footer-inner">
        <div>
          <div class="stamp-confidential">Confidential</div>
        </div>
        <div style="text-align: right;">
          <p style="font-size: 0.6rem;">© SeeteeS All Rights Reserved.</p>
        </div>
      </div>
    </footer>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const reveals = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('active');
          }
        });
      }, { threshold: 0.1 });
      reveals.forEach(el => observer.observe(el));
    });
  </script>
</body>
</html>
