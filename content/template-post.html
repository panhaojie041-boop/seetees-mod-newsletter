<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} | SEETEES.MOD // Raw Couture</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <header class="header container">
    <a href="../index.html" class="brand">SeeteeS<span>.MOD</span></a>
    <nav class="nav">
      <a href="../index.html" class="nav-item">Analisi</a>
      <a href="../archive.html" class="nav-item">Archivio</a>
    </nav>
  </header>

  <main class="container">
    <article class="post-content fade-in" style="padding: 100px 0;">
      <header class="post-header">
        <span class="label">Briefing Strategico // {{DATE}}</span>
        <h1 class="hero-title" style="font-size: 5rem;">{{TITLE}}</h1>
        <p class="post-lead" style="font-size: 1.5rem; margin-top: 40px; max-width: 800px; line-height: 1.4; color: var(--accent);">
          {{LEAD}}
        </p>
      </header>

      <section class="post-body" style="padding: 80px 0; max-width: 800px;">
        <div style="margin-bottom: 60px;">
          <h2 style="font-family: var(--font-serif); font-size: 2.5rem; margin-bottom: 30px; font-style: italic;">Key Insights</h2>
          <ul style="list-style: none; font-size: 1.1rem; line-height: 2;">
            <li style="border-bottom: 1px solid var(--line); padding: 15px 0;">— {{POINT_1}}</li>
            <li style="border-bottom: 1px solid var(--line); padding: 15px 0;">— {{POINT_2}}</li>
            <li style="border-bottom: 1px solid var(--line); padding: 15px 0;">— {{POINT_3}}</li>
          </ul>
        </div>

        <div style="font-size: 1.2rem; line-height: 1.6; margin-bottom: 60px;">
          <h2 style="font-family: var(--font-serif); font-size: 2.5rem; margin-bottom: 30px; font-style: italic;">Market Context</h2>
          <p>{{WHY_IT_MATTERS}}</p>
        </div>

        <!-- 3D Preview Styled for Raw Couture -->
        <div class="preview-3d" style="display: {{SHOW_3D}}; margin: 100px 0; border: 1px solid var(--ink); padding: 10px;">
          <p class="label" style="margin-bottom: 15px;">Digital Asset Preview</p>
          <iframe id="clo3d-iframe" src="{{CLO3D_URL}}" style="width: 100%; aspect-ratio: 16/9; border: none; background: #f0f0f0;"></iframe>
        </div>

        <div class="post-sources" style="margin-top: 80px; padding-top: 40px; border-top: 1px solid var(--ink);">
          <p class="label">Verified Intelligence</p>
          <div style="display: flex; gap: 40px; margin-top: 20px;">
            <a href="{{SOURCE_URL_1}}" target="_blank" class="nav-item">Source 01</a>
            <a href="{{SOURCE_URL_2}}" target="_blank" class="nav-item">Source 02</a>
          </div>
        </div>
      </section>
    </article>

    <footer class="footer container fade-in">
      <div class="footer-brand">SeeteeS.MOD</div>
      <p class="footer-info">© 2026 // RAW COUTURE EDITION</p>
    </footer>
  </main>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('active');
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
